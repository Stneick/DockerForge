services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dockerforge}
      POSTGRES_USER: ${POSTGRES_USER:-dockerforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dockerforge}
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dockerforge}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Message Broker
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backend
  dockerforge-api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    command: fastapi dev --host 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - project_data:/app/data/projects
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    command: arq app.worker.WorkerSettings
    volumes:
      - project_data:/app/data/projects
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  project_data:
